# Optional Render Blueprint — create a PostgreSQL database in the dashboard and set DATABASE_URL.
services:
  - type: web
    name: tech-party-game
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn tech_party_game.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
